<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>쿼리 메서드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 64px 24px 80px;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #86868b;
            margin-bottom: 12px;
        }

        .title {
            font-size: 34px;
            font-weight: 300;
            color: #1d1d1f;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: #6e6e73;
            font-weight: 400;
            margin-bottom: 48px;
            text-align: center;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid rgba(0,0,0,0.06);
            padding: 36px 32px;
            width: 100%;
            max-width: 480px;
        }

        form {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="number"] {
            flex: 1;
            min-width: 120px;
            height: 44px;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            padding: 0 14px;
            font-size: 15px;
            font-family: inherit;
            color: #1d1d1f;
            background: #f5f5f7;
            outline: none;
            transition: border 0.15s ease;
        }

        input[type="number"]:focus {
            border-color: #0071e3;
            background: #ffffff;
        }

        .label-text {
            font-size: 15px;
            color: #6e6e73;
            white-space: nowrap;
        }

        input[type="submit"] {
            height: 44px;
            padding: 0 20px;
            background: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
        }

        input[type="submit"]:hover {
            background: #0077ed;
        }

        input[type="submit"]:active {
            transform: scale(0.97);
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #86868b;
            text-align: center;
        }
    </style>
</head>
<body>

<p class="eyebrow">Wanted Dev Lab</p>
<h1 class="title">JPA 에서 제공하는 Query Method</h1>
<p class="subtitle">입력한 가격을 초과하는 메뉴 조회하기 TEST</p>

<div class="card">
    <form action="/menu/search" method="get">
        <input type="number" name="menuPrice">
        <span class="label-text">원을 초과하는 메뉴 목록 조회</span>
        <input type="submit" value="조회">
    </form>
</div>

<p class="footer">Wanted Bootcamp · Spring Boot + JPA</p>

</body>
</html>
