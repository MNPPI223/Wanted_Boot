<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>메뉴 상세 조회</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 64px 24px 80px;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #86868b;
            margin-bottom: 12px;
        }

        .title {
            font-size: 34px;
            font-weight: 300;
            color: #1d1d1f;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 48px;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid rgba(0,0,0,0.06);
            overflow: hidden;
            width: 100%;
            max-width: 640px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: #f5f5f7;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        th {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #86868b;
            padding: 14px 20px;
            text-align: left;
        }

        td {
            font-size: 15px;
            font-weight: 400;
            color: #1d1d1f;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #86868b;
            text-align: center;
        }
    </style>
</head>
<body>

<p class="eyebrow">Wanted Dev Lab</p>
<h1 class="title">PathVariable 로 전달 받은 메뉴 상세 조회</h1>

<div class="card">
    <table>
        <thead>
        <tr>
            <th>메뉴번호</th>
            <th>메뉴이름</th>
            <th>메뉴가격</th>
            <th>카테고리코드</th>
            <th>판매상태</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td th:text="${result.menuCode}"></td>
            <td th:text="${result.menuName}"></td>
            <td th:text="${result.menuPrice}"></td>
            <td th:text="${result.categoryCode}"></td>
            <td th:text="${result.orderableStatus}"></td>
        </tr>
        </tbody>
    </table>
</div>

<p class="footer">Wanted Bootcamp · Spring Boot + JPA</p>

</body>
</html>
