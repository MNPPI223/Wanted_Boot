<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>신규 메뉴 등록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 64px 24px 80px;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #86868b;
            margin-bottom: 12px;
        }

        .title {
            font-size: 34px;
            font-weight: 300;
            color: #1d1d1f;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 48px;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid rgba(0,0,0,0.06);
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #86868b;
        }

        input[type="text"],
        input[type="number"],
        select {
            height: 44px;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            padding: 0 14px;
            font-size: 15px;
            font-family: inherit;
            color: #1d1d1f;
            background: #f5f5f7;
            outline: none;
            transition: border 0.15s ease, background 0.15s ease;
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: #0071e3;
            background: #ffffff;
        }

        .divider {
            height: 1px;
            background: rgba(0,0,0,0.06);
            margin: 4px 0;
        }

        input[type="submit"] {
            height: 48px;
            background: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
            margin-top: 4px;
        }

        input[type="submit"]:hover { background: #0077ed; }
        input[type="submit"]:active { transform: scale(0.98); }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #86868b;
            text-align: center;
        }
    </style>
</head>
<body>

<p class="eyebrow">Wanted Dev Lab</p>
<h1 class="title">신규 메뉴 등록</h1>

<div class="card">
    <form action="/menu/regist" method="post">

        <div class="field">
            <label>메뉴 이름</label>
            <input type="text" name="menuName">
        </div>

        <div class="field">
            <label>메뉴 가격</label>
            <input type="number" name="menuPrice">
        </div>

        <div class="field">
            <label>카테고리</label>
            <select name="categoryCode" id="categoryCode"></select>
        </div>

        <div class="field">
            <label>판매여부</label>
            <select name="orderableStatus">
                <option value="Y">가능</option>
                <option value="N">불가능</option>
            </select>
        </div>

        <div class="divider"></div>

        <input type="submit" value="등록하기">

    </form>
</div>

<p class="footer">Wanted Bootcamp · Spring Boot + JPA</p>

<script>
    fetch('/menu/category')
        .then(res => res.json())
        .then(data => {

            const $categoryCode
                = document.getElementById("categoryCode");

            for(let index in data) {
                const $option = document.createElement("option");
                $option.value = data[index].categoryCode;
                $option.textContent = data[index].categoryName;

                $categoryCode.appendChild($option);
            }

        })
</script>

</body>
</html>
