spring:
  application:
    name: module04-association-mapping
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/menudb
    username: wanted
    password: wanted
  jpa:
    show-sql: true
    database: mysql
    hibernate:
      ddl-auto: none
      # create-drop : 테스트 시작 시 테이블 생성, 종료 시 테이블 삭제 → 테스트 환경에 적합
    properties:
      hibernate:
        format_sql: true