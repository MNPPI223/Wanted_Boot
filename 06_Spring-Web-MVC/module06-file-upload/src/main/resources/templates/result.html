<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1 th:text="${message}"></h1>
    <div th:if="${img != null}">
        <img th:src="@{${img}}" width="300" height="300" />
    </div>
<!-- 아래는 타임리프 상에서 사용하는 반복문이다!! -->
    <div th:else>
            <div th:each="img : ${imgs}">
                <img th:src="${img}" width="300" height="300"/>
            </div>
    </div>

</body>
</html>
